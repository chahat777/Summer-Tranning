<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
</head>
<body>

<h2>Simple Calculator</h2>

<label for="num1">Enter First Number:</label>
<input type="number" id="num1" name="num1" title="First number" placeholder="e.g. 5" aria-label="First number"><br><br>

<label for="num2">Enter Second Number:</label>
<input type="number" id="num2" name="num2" title="Second number" placeholder="e.g. 3" aria-label="Second number"><br><br>



<button onclick="add()">Addition (+)</button>
<button onclick="sub()">Subtraction (-)</button>
<button onclick="mul()">Multiplication (×)</button>
<button onclick="div()">Division (/)</button>

 
<h3 id="result"></h3>
11
110 

<script> 
function add() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    document.getElementById("result").innerHTML = "Result = " + (a + b);
}

function sub() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    document.getElementById("result").innerHTML = "Result = " + (a - b);
}

function mul() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);
    document.getElementById("result").innerHTML = "Result = " + (a * b);
}

function div() {
    let a = Number(document.getElementById("num1").value);
    let b = Number(document.getElementById("num2").value);

    if (b == 0) {
        document.getElementById("result").innerHTML = "Cannot divide by zero";
    } else {
        document.getElementById("result").innerHTML = "Result = " + (a / b);
    }
}
</script>

</body>
</html>
