<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascending Order</title>
</head>
<body>
<script>
let arr = [50, 20, 10, 40, 30];
arr.sort(function(a, b) {
    return a - b;
});
document.write("Ascending Order: " + arr);
</script>
</body>
</html>

<script>
let arrDesc = [50, 20, 10, 40, 30];
arrDesc.sort(function(a, b) {
    return b - a;
});
document.write("Descending Order: " + arrDesc);
</script>

</body>
</html>
