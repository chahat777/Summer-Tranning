<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Zone</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
}

header{
background:#111827;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
color:#00ffcc;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
}

.hero{
height:350px;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(to right,#0f2027,#203a43,#2c5364);
}

.hero h2{
font-size:45px;
}

.hero p{
margin:15px;
}

.hero button{
padding:12px 25px;
background:#00ffcc;
border:none;
font-size:18px;
cursor:pointer;
border-radius:10px;
}

.games{
padding:40px;
text-align:center;
}

.card{
display:inline-block;
width:250px;
background:#1e293b;
margin:15px;
padding:20px;
border-radius:15px;
transition:.4s;
}

.card:hover{
transform:scale(1.05);
background:#334155;
}

.game{
margin-top:50px;
padding:30px;
text-align:center;
}

input{
padding:10px;
width:150px;
text-align:center;
font-size:18px;
}

button{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

#result{
font-size:22px;
margin-top:20px;
color:#00ff99;
}

footer{
background:#111827;
padding:20px;
text-align:center;
margin-top:40px;
}
</style>

</head>

<body>

<header>

<h1>🎮 Gaming Zone</h1>

<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h2>Welcome Gamer</h2>

<p>Play Amazing Games & Enjoy</p>

<button onclick="document.getElementById('play').scrollIntoView()">
Play Now
</button>

</section>

<section class="games">

<h2>Popular Games</h2>

<div class="card">
<h3>🎯 Guess Number</h3>
<p>Play Now</p>
</div>

<div class="card">
<h3>❌ Tic Tac Toe</h3>
<p>Coming Soon</p>
</div>

<div class="card">
<h3>🚗 Racing</h3>
<p>Coming Soon</p>
</div>

</section>

<section class="game" id="play">

<h2>Guess The Number Game</h2>

<p>Guess a number between 1 to 10</p>

<label for="guess">Your guess:</label>
<input type="number" id="guess" title="Enter a number between 1 and 10" placeholder="1-10">

<br>

<button onclick="check()">Submit</button>

<button onclick="restart()">Restart</button>

<h3 id="result"></h3>

<h3 id="score">Score : 0</h3>

</section>

<footer>

<h3>Created By Chahat Kumar ❤️</h3>

</footer>

<script>

let random=Math.floor(Math.random()*10)+1;

let score=0;

function check(){

let user=Number(document.getElementById("guess").value);

if(user==random){

score++;

document.getElementById("result").innerHTML="🎉 Correct Answer";

document.getElementById("score").innerHTML="Score : "+score;

random=Math.floor(Math.random()*10)+1;

}

else if(user>random){

document.getElementById("result").innerHTML="📈 Too High";

}

else{

document.getElementById("result").innerHTML="📉 Too Low";

}

}

function restart(){

random=Math.floor(Math.random()*10)+1;

document.getElementById("guess").value="";

document.getElementById("result").innerHTML="Game Restarted";

}

</script>

</body>
</html>
