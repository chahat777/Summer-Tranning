<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#000009;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.container{
    text-align:center;
}
h1{
    margin-bottom:20px;
}
.board{ 
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:5px;
}
.cell{
    width:100px;
    height:100px;
    background:white;
    color:black;
    font-size:40px;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}
button{
    margin-top:20px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
#status{
    margin-top:15px;
    font-size:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>Tic Tac Toe</h1>

<div class="board">
<div class="cell" onclick="play(this,0)"></div>
<div class="cell" onclick="play(this,1)"></div>
<div class="cell" onclick="play(this,2)"></div>
<div class="cell" onclick="play(this,3)"></div>
<div class="cell" onclick="play(this,4)"></div>
<div class="cell" onclick="play(this,5)"></div>
<div class="cell" onclick="play(this,6)"></div>
<div class="cell" onclick="play(this,7)"></div>
<div class="cell" onclick="play(this,8)"></div>
</div>

<p id="status">Player X Turn</p>

<button onclick="restart()">Restart Game</button>

</div>

<script>
let board=["","","","","","","","",""];
let currentPlayer="X";
let gameOver=false;

const winPatterns=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function play(cell,index){

if(board[index]!="" || gameOver)
return;

board[index]=currentPlayer;
cell.innerHTML=currentPlayer;

if(checkWinner()){
document.getElementById("status").innerHTML=
"Player "+currentPlayer+" Wins!";
gameOver=true;
return;
}

if(!board.includes("")){
document.getElementById("status").innerHTML="Match Draw!";
gameOver=true;
return;
}

currentPlayer=currentPlayer=="X"?"O":"X";

document.getElementById("status").innerHTML=
"Player "+currentPlayer+" Turn";
}

function checkWinner(){

for(let pattern of winPatterns){

let[a,b,c]=pattern;

if(board[a] &&
board[a]==board[b] &&
board[a]==board[c]){

return true;

}

}

return false;

}

function restart(){

board=["","","","","","","","",""];

currentPlayer="X";

gameOver=false;

document.querySelectorAll(".cell").forEach(cell=>cell.innerHTML="");

document.getElementById("status").innerHTML="Player X Turn";

}
</script>

</body>
</html>
