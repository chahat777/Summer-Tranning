<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Square Controls</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
        background: #f5f5f5;
    }

    .controls {
        margin-bottom: 20px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    #square {
        width: 100px;
        height: 100px;
        background: red;
        border: 5px solid blue;
        margin: auto;
        position: relative;
        transform: scale(1);
        transition: all 0.3s ease;
    }
</style>
</head>
<body>

<div class="controls">
    <button onclick="hideSquare()">Hide</button>
    <button onclick="showSquare()">Unhide</button>
    <button onclick="zoomIn()">Zoom In</button>
    <button onclick="zoomOut()">Zoom Out</button>
    <button onclick="moveLeft()">Left</button>
    <button onclick="moveRight()">Right</button>
    <button onclick="location.reload()">Reset</button>
    <button onclick="resetSquare()">Reset Square</button>
    <button onclick="location.up()">Down</button>
</div>

<div id="square"></div>

<script>
let scale = 1;
let position = 0;

const square = document.getElementById("square");

function updateSquare() {
    square.style.transform = `translateX(${position}px) scale(${scale})`;
}

function hideSquare() {
    square.style.display = "none";
}

function showSquare() {
    square.style.display = "block";
}

function zoomIn() {
    scale += 0.2;
    updateSquare();
}

function zoomOut() {
    if (scale > 0.4) {
        scale -= 0.2;
        updateSquare();
    }
}

function moveLeft() {
    position -= 20;
    updateSquare();
}

function moveRight() {
    position += 20;
    updateSquare();
}
function resetSquare() {
    scale = 1;
    position = 0;
    updateSquare();
}
function resetSquare() {
    scale = 1;
    position = 0;
    updateSquare();
}
</script>

</body>
</html>
