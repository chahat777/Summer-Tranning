 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
</head>
<body>

<label for="n">Name:</label>
<input id="n" title="Enter student name" placeholder="Enter name"><br><br>
<label for="m1">Marks 1:</label>
<input id="m1" title="Enter marks for subject 1" placeholder="Marks 1">
<label for="m2">Marks 2:</label>
<input id="m2" title="Enter marks for subject 2" placeholder="Marks 2">
<label for="m3">Marks 3:</label>
<input id="m3" title="Enter marks for subject 3" placeholder="Marks 3"><br><br>

<button onclick="r()">Result</button>

<p id="a"></p>

<script>
function r(){
let n=document.getElementById("n").value;
let a=+m1.value,b=+m2.value,c=+m3.value;
let t=a+b+c,p=t/3;
document.getElementById("a").innerHTML=
"Name: "+n+"<br>Total: "+t+
"<br>Percentage: "+p.toFixed(2)+"%"+
"<br>"+(p>=33?"PASS":"FAIL");
}
</script>

</body>
</html>
