<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Registration Form</title>
</head>
<body>

<h2>Registration Form</h2>

<form onsubmit="return check()">

<label for="name">Name:</label>
<input type="text" id="name" name="name" title="Enter your full name" placeholder="Full name"><br><br>

<label for="email">Email:</label>
<input type="email" id="email" name="email" title="Enter your email address" placeholder="you@example.com"><br><br>

<label for="age">Age:</label>
<input type="number" id="age" name="age" title="Enter your age" placeholder="Age" min="18" max="60"><br><br>

<label for="pass">Password:</label>
<input type="password" id="pass" name="pass" title="Enter your password" placeholder="Password"><br><br>

<label for="cpass">Confirm Password:</label>
<input type="password" id="cpass" name="cpass" title="Confirm your password" placeholder="Confirm password"><br><br>

<input type="submit" value="Submit">

</form>

<script>

function check(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var age=document.getElementById("age").value;
var pass=document.getElementById("pass").value;
var cpass=document.getElementById("cpass").value;

if(name==""){
alert("Enter Name");
return false;
}

if(email==""){
alert("Enter Email");
return false;
}

if(age<18 || age>60){
alert("Age must be between 18 and 60");
return false;
}

if(pass!=cpass){
alert("Password Not Match");
return false;
}

alert("Form Submitted");
return true;

}

</script>

</body>
</html>
